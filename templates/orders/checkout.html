{% extends 'base.html' %}

{% block content %}

<div class="m-4 container d-flex justify-content-center align-items-center" style="min-height: 70vh;">

  <div class="card text-center p-5 shadow-sm border-0 success-card">

    <!-- Success Icon -->
    <div class="mb-4">
      <div class="success-icon">✅</div>
    </div>

    <!-- Title -->
    <h2 class="fw-bold text-success mb-3">
      Order Placed Successfully!
    </h2>

    <!-- Message -->
    <p class="text-muted mb-4">
      Thank you for your purchase. Your order has been confirmed 🎉
    </p>

    <!-- Order Details -->
    <div class="bg-light rounded p-3 mb-4 text-start">

      <p class="mb-1"><strong>Order ID:</strong> {{ order.id }}</p>
      <p class="mb-1"><strong>Total Amount:</strong> ₹{{ order.total_price }}</p>
      <p class="mb-0"><strong>Status:</strong> 
        <span class="badge bg-success">{{ order.status }}</span>
      </p>

    </div>

    <!-- Buttons -->
    <div class="d-flex justify-content-center gap-3">

      <a href="{% url 'product_list' %}" class="btn btn-primary px-4 rounded-pill">
        🛍️ Continue Shopping
      </a>

      <a href="#" class="btn btn-outline-secondary rounded-pill">
        📦 Track Order
      </a>

    </div>

  </div>

</div>

{% endblock %}
