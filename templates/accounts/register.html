{% extends 'base.html' %}

{% block content %}

<div class="m-3 d-flex justify-content-center align-items-center" style="min-height: 75vh;">

  <div class="card p-4 shadow-sm border-0 login-card">

    <!-- Title -->
    <h3 class="text-center fw-bold mb-3">Create Account 🚀</h3>
    <p class="text-center text-muted mb-4">Join us and start shopping</p>

    <!-- Form -->
    <form method="POST">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Username</label>
        {{ form.username }}
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        {{ form.email }}
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        {{ form.password1 }}
      </div>

      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        {{ form.password2 }}
      </div>

      <button type="submit" class="btn btn-primary w-100 rounded-pill">
        📝 Register
      </button>
    </form>

    <!-- Divider -->
    <hr class="my-4">

    <!-- Login -->
    <p class="text-center mb-0">
      Already have an account?
      <a href="{% url 'login' %}" class="fw-semibold text-decoration-none">
        Login
      </a>
    </p>

  </div>

</div>

{% endblock %}
