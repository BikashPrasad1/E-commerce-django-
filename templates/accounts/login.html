{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 75vh;">

  <div class="card p-4 shadow-sm border-0 login-card">

    <!-- Title -->
    <h3 class="text-center fw-bold mb-3">Welcome Back 👋</h3>
    <p class="text-center text-muted mb-4">Login to your account</p>

    <!-- Form -->
    <form method="POST">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Username</label>
        {{ form.username }}
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        {{ form.password }}
      </div>

      <button type="submit" class="btn btn-primary w-100 rounded-pill">
        🔐 Login
      </button>
    </form>

    <!-- Divider -->
    <hr class="my-4">

    <!-- Register -->
    <p class="text-center mb-0">
      Don’t have an account?
      <a href="{% url 'register' %}" class="fw-semibold text-decoration-none">
        Register
      </a>
    </p>

  </div>

</div>

{% endblock %}
